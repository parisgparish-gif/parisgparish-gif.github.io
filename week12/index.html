<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <style> 

    	.header {
			float: none; 
			height: 50px;
		 
		}
		.headliner {
			float: none; 
			height: 85px;
		 
		}
    	.Lcolumn {
			float: left; 
			width: 30%;
			height:645px;
			 
		}
		.Rcolumn {
			float: right; 
			width: 70%;
			height: 645px;
		 
		}
		}
		.footer {
			clear:both; 
			height:80px;
		  float:right;
		}
		.all:after { 
			content: "";
			display: table; 
			clear: both; 
			margin: 0 auto;
		}

	</style>
	<div class="all">
		<div class="header" style="background-color:#834049;">
	

		</div>
		<div class="headliner" style="background-color:#ffffff;">
		

		</div>
		<div class="Lcolumn" style="background-color:#434838">
		
			</div>
        <div class="Rcolumn" style="background-color:#3e475f">
       
			
        </div>
        <div class="footer" style="background-color: #4D0000">
        	<h1> :^) </h1>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    

  </body>
</html>
